<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fangen</title>
    <link href="../resources/css/index.css" rel="stylesheet" />
  </head>

  <body>
    <div class="page">
      <nav class="page__navbar">
        <h1 class="page__title">Fangen</h1>
        <div class="page__options">
          <a
            class="page__navbar_source"
            href="https://github.com/zaryo/fangen"
            title="Source"
          ></a>
          <button
            class="page__navbar_theme_toggle"
            type="button"
            title="Toggle theme"
          ></button>
        </div>
      </nav>
      <p class="page__tutorial">
        Start by pressing the
        <strong>"Get streaming servers addresses"</strong> button.
      </p>

      <ul class="page__servers_list"></ul>
      <div class="page__servers_action">
        <p class="page__servers_action_troubleshoot">
          If it does not work, try reloading the page and playing the video. If
          error persists, do not hesitate on
          <a href="https://github.com/zaryo/fangen/issues/new"
            >reporting the issue</a
          >.
        </p>
        <div class="page__button_wrapper">
          <button
            class="page__button_fetch_streaming_urls"
            title="Get streaming addresses"
            type="button"
          >
            <p>Get streaming servers addresses</p>
          </button>
          <div class="page__button_delete_wrapper">
            <button
              class="page__button_delete_streaming_urls"
              title="Delete streaming addresses"
              type="button"
            ></button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../dist/main.js"></script>
  </body>
</html>
