name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - uses: zaryo/release-action/match-version@main
        with:
          source: browser_extension_manifest

      - name: install chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable xvfb

      - name: decode extension key
        run: echo "${{ secrets.EXTENSION_PRIVATE_KEY }}" | base64 -d > /tmp/extension.pem
        shell: bash

      - name: pack extension
        run: |
          xvfb-run google-chrome \
            --pack-extension="$GITHUB_WORKSPACE" \
            --pack-extension-key="/tmp/extension.pem" \
            --no-sandbox
          mv "${GITHUB_WORKSPACE}.crx" fangen.crx
        shell: bash

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fangen.crx
          path: fangen.crx

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: extract version
        id: version
        run: |
          version=$(jq -r '.version' manifest.json)
          echo "name=v$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: zaryo/release-action/match-version@b58fb98ef2d7d01f9150011ef2fe28b6076c21af
        with:
          source: browser_extension_manifest

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: ${{ steps.version.outputs.name }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          tag_name: ${{ github.ref }}
