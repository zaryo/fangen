name: test

on:
  pull_request:
    branches:
      - "**"
    types:
      - edited
      - opened
      - ready_for_review
      - review_requested
      - synchronize
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup chromium
        id: setup-chromium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: latest

      - name: setup firefox
        id: setup-firefox
        uses: browser-actions/setup-firefox@v1

      - name: test
        run: make test
        env:
          CHROMIUM_BINARY: ${{ steps.setup-chromium.outputs.chrome-path }}
          FIREFOX_BINARY: ${{ steps.setup-firefox.outputs.firefox-path }}
